<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlackBoney AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        html, body { height: 100%; width: 100%; background-color: #000000; color: #e5e7eb; overflow: hidden; position: relative; }
        #bgCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        .app-layout { display: flex; width: 100%; height: 100%; position: relative; z-index: 2; }
        
        /* SIDEBAR K7EL GHAME9 B BORDER RED */
        .sidebar { width: 260px; height: 100%; background: rgba(10, 10, 15, 0.95); border-right: 1px solid rgba(220, 38, 38, 0.4); display: flex; flex-direction: column; padding: 15px; transition: all 0.3s ease; backdrop-filter: blur(5px); z-index: 20; }
        .new-chat-btn { width: 100%; padding: 12px; background: transparent; border: 1px dashed #dc2626; color: #dc2626; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; height: auto; }
        .new-chat-btn:hover { background: rgba(220, 38, 38, 0.1); }
        
        .history-section { flex: 1; margin-top: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .history-title { font-size: 0.75rem; color: #4b5563; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 5px; }
        
        .history-item { padding: 10px 12px; background: rgba(17, 24, 39, 0.6); border: 1px solid rgba(31, 41, 61, 0.2); border-radius: 6px; font-size: 0.85rem; color: #9ca3af; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .history-item:hover { background: rgba(220, 38, 38, 0.15); color: #ffffff; border-color: rgba(220, 38, 38, 0.4); }
        .history-item.active { background: rgba(220, 38, 38, 0.2); border-color: #dc2626; color: #ffffff; font-weight: 600; }

        /* MAIN CHAT AREA */
        .chat-container { flex: 1; height: 100%; display: flex; flex-direction: column; background: rgba(5, 5, 5, 0.3); backdrop-filter: blur(2px); }
        .chat-header { background: rgba(15, 10, 10, 0.8); height: 60px; display: flex; align-items: center; padding: 0 20px; font-size: 1.05rem; font-weight: 800; letter-spacing: 2px; border-bottom: 1px solid rgba(220, 38, 38, 0.4); color: #dc2626; text-shadow: 0 0 15px rgba(220, 38, 38, 0.6); }
        
        .menu-toggle { background: transparent; border: none; cursor: pointer; width: 35px; height: 35px; display: none; align-items: center; justify-content: center; margin-right: 15px; }
        .header-title { flex: 1; text-align: center; margin-right: 40px; }
        
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 30px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.4; word-wrap: break-word; font-size: 0.95rem; animation: fadeIn 0.2s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user-message { background: linear-gradient(135deg, #dc2626, #991b1b); color: #ffffff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-message { background: rgba(17, 24, 39, 0.85); color: #f3f4f6; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(220, 38, 38, 0.3); }
        
        .chat-input-area { padding: 12px; background: rgba(15, 10, 10, 0.9); border-top: 1px solid rgba(220, 38, 38, 0.4); display: flex; justify-content: center; align-items: center; }
        .search-bar-wrapper { width: 100%; max-width: 800px; display: flex; align-items: center; background: #000000; border: 1px solid #2d1f1f; border-radius: 30px; padding: 4px 6px 4px 16px; transition: all 0.2s ease; }
        .search-bar-wrapper:focus-within { border-color: #dc2626; box-shadow: 0 0 15px rgba(220, 38, 38, 0.3); }
        
        input { flex: 1; background: transparent; border: none; color: #ffffff; font-size: 1rem; outline: none; padding: 8px 0; -webkit-appearance: none; }
        input::placeholder { color: #554b4b; }
        .send-btn { background: #dc2626; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; flex-shrink: 0; transition: background 0.2s; }
        .send-btn:hover { background: #b91c1c; }

        @media (max-width: 768px) {
            .menu-toggle { display: flex; } .header-title { margin-right: 0; text-align: left; }
            .sidebar { position: absolute; left: -260px; top: 0; bottom: 0; box-shadow: 5px 0 15px rgba(0,0,0,0.7); }
            .sidebar.active { left: 0; }
            .sidebar-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 15; }
            .sidebar-overlay.active { display: block; }
        }
        .chat-messages::-webkit-scrollbar, .sidebar::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #2d1f1f; border-radius: 4px; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="app-layout">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <button class="new-chat-btn" onclick="startNewChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            New Chat
        </button>
        <div class="history-section">
            <div class="history-title">Saved Chats</div>
            <div id="historyList"></div>
        </div>
    </div>

    <!-- MAIN CHAT -->
    <div class="chat-container">
        <div class="chat-header">
            <button class="menu-toggle" onclick="toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="header-title">BlackBoney AI</div>
        </div>
        <div class="chat-messages" id="chatBox"></div>
        <div class="chat-input-area">
            <div class="search-bar-wrapper">
                <input type="text" id="userInput" placeholder="Ask Boney anything..." onkeypress="handleKeyPress(event)" enterkeyhint="send">
                <button class="send-btn" onclick="sendMessage()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const historyList = document.getElementById('historyList');

    function handleKeyPress(event) { if (event.key === 'Enter') sendMessage(); }
    function toggleSidebar() { sidebar.classList.toggle('active'); overlay.classList.toggle('active'); }

    window.onload = function() {
        loadSidebarAndChat();
    };

    async function loadSidebarAndChat() {
        try {
            const res = await fetch('/api/chats');
            const data = await res.json();
            
            historyList.innerHTML = '';
            data.chats.forEach(c => {
                const isActive = c.id === data.active_id;
                const item = document.createElement('div');
                item.className = `history-item ${isActive ? 'active' : ''}`;
                item.onclick = () => switchChat(c.id);
                item.innerHTML = `
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    ${c.title}
                `;
                historyList.appendChild(item);
            });

            if (data.active_id) {
                const activeRes = await fetch(`/api/chats/switch/${data.active_id}`, { method: 'POST' });
                const activeData = await activeRes.json();
                renderMessages(activeData.messages);
            }
        } catch (e) { console.error(e); }
    }

    function renderMessages(messages) {
        chatBox.innerHTML = '';
        if (!messages || messages.length === 0) {
            chatBox.innerHTML = '<div class="message ai-message">Marhba bik! Chno bghiti n-3awnk biha lyoum? 🚀</div>';
            return;
        }
        messages.forEach(msg => {
            const roleClass = msg.role === 'user' ? 'user-message' : 'ai-message';
            const text = msg.parts[0].text;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${roleClass}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        const msgDiv = document.createElement('div');
        msgDiv.className = 'message user-message';
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        
        userInput.value = '';
        const loadingId = 'loading-' + Date.now();
        const loadDiv = document.createElement('div');
        loadDiv.className = 'message ai-message';
        loadDiv.id = loadingId;
        loadDiv.innerText = 'Typing...';
        chatBox.appendChild(loadDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            document.getElementById(loadingId).innerText = data.response;
            loadSidebarAndChat();
        } catch (error) {
            document.getElementById(loadingId).innerText = "Oups! Error server.";
        }
    }

    async function startNewChat() {
        await fetch('/api/chats/new', { method: 'POST' });
        loadSidebarAndChat();
        if(window.innerWidth <= 768) toggleSidebar();
    }

    async function switchChat(id) {
        const res = await fetch(`/api/chats/switch/${id}`, { method: 'POST' });
        const data = await res.json();
        renderMessages(data.messages);
        document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
        loadSidebarAndChat();
        if(window.innerWidth <= 768) toggleSidebar();
    }

    /* ── POLYGON PARTICLES BACKGROUND (RED EDITION) ── */
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let particlesArray = []; const maxParticles = 45; const mouse = { x: null, y: null, radius: 110 };
    window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
    window.addEventListener('touchmove', (e) => { if(e.touches.length > 0) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; } });
    window.addEventListener('touchstart', (e) => { if(e.touches.length > 0) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; } });
    window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
    
    class Particle {
        constructor(x, y) { this.x = x; this.y = y; this.size = Math.random() * 2 + 1; this.speedX = (Math.random() * 1) - 0.5; this.speedY = (Math.random() * 1) - 0.5; }
        update() { this.x += this.speedX; this.y += this.speedY; if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX; if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY; }
        draw() { ctx.fillStyle = 'rgba(220, 38, 38, 0.5)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
    function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; particlesArray = []; for (let i = 0; i < maxParticles; i++) particlesArray.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height)); }
    function connectParticles() {
        for (let a = 0; a < particlesArray.length; a++) {
            for (let b = a; b < particlesArray.length; b++) {
                let dx = particlesArray[a].x - particlesArray[b].x; let dy = particlesArray[a].y - particlesArray[b].y; let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 100) { ctx.strokeStyle = `rgba(220, 38, 38, ${(1 - (distance / 100)) * 0.15})`; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke(); }
                if (mouse.x !== null && mouse.y !== null) {
                    let mdx = particlesArray[a].x - mouse.x; let mdy = particlesArray[a].y - mouse.y; let mDistance = Math.sqrt(mdx * mdx + mdy * mdy);
                    if (mDistance < mouse.radius) { ctx.strokeStyle = `rgba(185, 28, 28, ${(1 - (mDistance / mouse.radius)) * 0.35})`; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke(); }
                }
            }
        }
    }
    function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); particlesArray[i].draw(); } connectParticles(); requestAnimationFrame(animate); }
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    init(); animate();
</script>
</body>
</html>
