<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlackBoney AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        html, body { height: 100%; width: 100%; background-color: #000000; color: #e5e7eb; overflow: hidden; position: relative; }
        #bgCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .app-layout { display: flex; width: 100%; height: 100%; position: relative; z-index: 2; }
        .sidebar { width: 260px; height: 100%; background: rgba(10, 10, 15, 0.95); border-right: 1px solid rgba(220, 38, 38, 0.4); display: flex; flex-direction: column; padding: 15px; transition: all 0.3s ease; backdrop-filter: blur(5px); z-index: 20; }
        .new-chat-btn { width: 100%; padding: 12px; background: transparent; border: 1px dashed #dc2626; color: #dc2626; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
        .new-chat-btn:hover { background: rgba(220, 38, 38, 0.1); }
        .history-section { flex: 1; margin-top: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .history-title { font-size: 0.75rem; color: #4b5563; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 5px; }
        .history-item { padding: 10px 12px; background: rgba(17, 24, 39, 0.6); border: 1px solid rgba(31, 41, 61, 0.2); border-radius: 6px; font-size: 0.85rem; color: #9ca3af; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .history-item:hover { background: rgba(220, 38, 38, 0.15); color: #ffffff; border-color: rgba(220, 38, 38, 0.4); }
        .history-item.active { background: rgba(220, 38, 38, 0.2); border-color: #dc2626; color: #ffffff; font-weight: 600; }
        .chat-container { flex: 1; height: 100%; display: flex; flex-direction: column; background: rgba(5, 5, 5, 0.3); backdrop-filter: blur(2px); }
        .chat-header { background: rgba(15, 10, 10, 0.8); height: 60px; display: flex; align-items: center; padding: 0 20px; font-size: 1.05rem; font-weight: 800; letter-spacing: 2px; border-bottom: 1px solid rgba(220, 38, 38, 0.4); color: #dc2626; text-shadow: 0 0 15px rgba(220, 38, 38, 0.6); }
        .menu-toggle { background: transparent; border: none; cursor: pointer; width: 35px; height: 35px; display: none; align-items: center; justify-content: center; margin-right: 15px; }
        .header-title { flex: 1; text-align: center; margin-right: 40px; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 30px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.4; word-wrap: break-word; font-size: 0.95rem; animation: fadeIn 0.2s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user-message { background: linear-gradient(135deg, #dc2626, #991b1b); color: #ffffff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-message { background: rgba(17, 24, 39, 0.85); color: #f3f4f6; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(220, 38, 38, 0.3); }
        .chat-input-area { padding: 12px; background: rgba(15, 10, 10, 0.9); border-top: 1px solid rgba(220, 38, 38, 0.4); display: flex; justify-content: center; align-items: center; }
        .search-bar-wrapper { width: 100%; max-width: 800px; display: flex; align-items: center; background: #000000; border: 1px solid #2d1f1f; border-radius: 30px; padding: 4px 6px 4px 16px; transition: all 0.2s ease; }
        .search-bar-wrapper:focus-within { border-color: #dc2626; box-shadow: 0 0 15px rgba(220, 38, 38, 0.3); }
        input { flex: 1; background: transparent; border: none; color: #ffffff; font-size: 1rem; outline: none; padding: 8px 0; }
        input::placeholder { color: #554b4b; }
        .send-btn { background: #dc2626; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .send-btn:hover { background: #b91c1c; }
        @media (max-width: 768px) { .menu-toggle { display: flex; } .header-title { margin-right: 0; text-align: left; } .sidebar { position: absolute; left: -260px; top: 0; bottom: 0; } .sidebar.active { left: 0; } }
    </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="app-layout">
    <div class="sidebar" id="sidebar">
        <button class="new-chat-btn" onclick="startNewChat()">New Chat</button>
        <div class="history-section"><div class="history-title">Saved Chats</div><div id="historyList"></div></div>
    </div>
    <div class="chat-container">
        <div class="chat-header">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div class="header-title">BoneY AI</div>
        </div>
        <div class="chat-messages" id="chatBox"></div>
        <div class="chat-input-area">
            <div class="search-bar-wrapper">
                <input type="text" id="userInput" placeholder="Ask Boney anything..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">➔</button>
            </div>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    let currentMessages = [];
    let GEMINI_KEY = "";

    function handleKeyPress(event) { if (event.key === 'Enter') sendMessage(); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    window.onload = function() { loadSidebarAndChat(); };

    async function loadSidebarAndChat() {
        try {
            const res = await fetch('/api/chats');
            const data = await res.json();
            GEMINI_KEY = data.api_key;
            
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            data.chats.forEach(c => {
                const isActive = c.id === data.active_id;
                const item = document.createElement('div');
                item.className = `history-item ${isActive ? 'active' : ''}`;
                item.onclick = () => switchChat(c.id);
                item.innerText = c.title;
                historyList.appendChild(item);
            });

            if (data.active_id) {
                const activeRes = await fetch(`/api/chats/switch/${data.active_id}`, { method: 'POST' });
                const activeData = await activeRes.json();
                currentMessages = activeData.messages || [];
                renderMessages(currentMessages);
            }
        } catch (e) { console.error(e); }
    }

    function renderMessages(messages) {
        chatBox.innerHTML = '';
        if (!messages || messages.length === 0) {
            chatBox.innerHTML = '<div class="message ai-message">Marhba bik f BlackBoney AI! Kidayr? 🚀</div>';
            return;
        }
        messages.forEach(msg => {
            const roleClass = msg.role === 'user' ? 'user-message' : 'ai-message';
            const text = msg.parts[0].text;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${roleClass}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        userInput.value = '';
        currentMessages.push({ "role": "user", "parts": [{ "text": text }] });
        renderMessages(currentMessages);

        const loadingId = 'loading-' + Date.now();
        const loadDiv = document.createElement('div');
        loadDiv.className = 'message ai-message';
        loadDiv.id = loadingId;
        loadDiv.innerText = 'Typing...';
        chatBox.appendChild(loadDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // FETCh DIRECT TO GEMINI API FROM BROWSER (BYPASS VERCEL 403 PROXY)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: currentMessages,
                    systemInstruction: { parts: [{ text: "Your name is BlackBoney AI. Speak fluently in Darija. Keep answers clear and short." }] }
                })
            });
            
            const resData = await response.json();
            const aiResponse = resData.candidates[0].content.parts[0].text;
            
            document.getElementById(loadingId).remove();
            currentMessages.push({ "role": "model", "parts": [{ "text": aiResponse }] });
            renderMessages(currentMessages);

            // Sync structural memory back to backend session
            await fetch('/api/chat/sync', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: currentMessages, first_msg: text })
            });
            loadSidebarAndChat();

        } catch (error) {
            document.getElementById(loadingId).innerText = "Oups! Check if Key is valid or network.";
        }
    }

    async function startNewChat() {
        await fetch('/api/chats/new', { method: 'POST' });
        loadSidebarAndChat();
    }

    async function switchChat(id) {
        const res = await fetch(`/api/chats/switch/${id}`, { method: 'POST' });
        const data = await res.json();
        currentMessages = data.messages || [];
        renderMessages(currentMessages);
        loadSidebarAndChat();
    }
</script>
</body>
</html>
